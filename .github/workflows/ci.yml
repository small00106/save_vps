name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudnest-web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            cloudnest/go.sum
            cloudnest-agent/go.sum

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run backend tests
        shell: bash
        run: |
          set -euo pipefail
          (cd cloudnest && go test ./...)
          (cd cloudnest-agent && go test ./...)

      - name: Build frontend
        shell: bash
        run: |
          set -euo pipefail
          (cd cloudnest-web && npm ci && npm run build)

      - name: Check scripts and compose files
        shell: bash
        run: |
          set -euo pipefail
          bash -n install-master.sh
          bash -n release/build-release.sh
          bash -n scripts/build-assets.sh
          bash -n scripts/smoke-test-release.sh
          bash -n scripts/smoke-test-docker.sh
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.yml -f docker-compose.build.yml config

      - name: Build shared assets
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build-assets.sh frontend --output "${RUNNER_TEMP}/frontend-dist"
          bash scripts/build-assets.sh agent --output "${RUNNER_TEMP}/agent-dist"

      - name: Build Docker image
        shell: bash
        run: docker build -t cloudnest-ci:test .

      - name: Smoke test Docker image
        shell: bash
        run: bash scripts/smoke-test-docker.sh --image cloudnest-ci:test --port 18882
