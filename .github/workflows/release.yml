name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            git checkout "${{ inputs.tag }}"
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: cloudnest-web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            cloudnest/go.sum
            cloudnest-agent/go.sum

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run tests and preflight checks
        shell: bash
        run: |
          set -euo pipefail
          (cd cloudnest && go test ./...)
          (cd cloudnest-agent && go test ./...)
          (cd cloudnest-web && npm ci && npm run build)
          bash -n install-master.sh
          bash -n release/build-release.sh
          bash -n scripts/build-assets.sh
          bash -n scripts/smoke-test-release.sh
          bash -n scripts/smoke-test-docker.sh
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.yml -f docker-compose.build.yml config

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release assets
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.tag }}
        run: bash release/build-release.sh

      - name: Smoke test release bundle
        shell: bash
        run: bash scripts/smoke-test-release.sh --bundle release/dist/cloudnest-master-linux-amd64.tar.gz --port 18880

      - name: Build local Docker smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: cloudnest-smoke:${{ steps.meta.outputs.tag }}

      - name: Smoke test Docker image
        shell: bash
        run: bash scripts/smoke-test-docker.sh --image cloudnest-smoke:${{ steps.meta.outputs.tag }} --port 18881

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/small00106/save_vps:${{ steps.meta.outputs.tag }}
            ghcr.io/small00106/save_vps:latest

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: release/dist/*
          fail_on_unmatched_files: true
